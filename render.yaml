services:
  # ── API service ─────────────────────────────────────────────────────────────
  - type: web
    name: smart-qa-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # Set this secret manually in the Render dashboard
      - key: CHROMA_DB_PATH
        value: /data/chroma_db
      - key: UPLOAD_DIR
        value: /data/uploaded_pdfs
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: qa-persistent-data
      mountPath: /data
      sizeGB: 1               # Increase if you expect large document volumes

  # ── UI service ───────────────────────────────────────────────────────────────
  - type: web
    name: smart-qa-ui
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run ui/streamlit_app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: API_BASE_URL
        value: https://smart-qa-api.onrender.com   # Update to your actual API service URL
      - key: PYTHON_VERSION
        value: "3.11.0"
